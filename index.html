<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Tech Price Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { darkBg: '#0f172a', darkCard: '#1e293b' } } }
        }
    </script>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-darkBg dark:text-gray-100 transition-colors duration-300 min-h-screen font-sans">

    <nav class="border-b border-gray-200 dark:border-slate-800 bg-white dark:bg-darkCard px-6 py-4 sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="bg-indigo-600 text-white p-2 rounded-lg shadow-md"><i class="fa-solid fa-globe text-xl"></i></div>
                <span class="text-xl font-bold tracking-tight bg-gradient-to-r from-indigo-500 to-purple-600 bg-clip-text text-transparent">Live Market Stream</span>
            </div>
            <div class="flex items-center space-x-4">
                <button onclick="fetchLivePrices()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg font-medium shadow-md transition-all flex items-center space-x-2">
                    <i class="fa-solid fa-arrows-rotate text-sm"></i><span>Scan Real Live Feeds</span>
                </button>
                <button onclick="toggleDarkMode()" class="p-2.5 rounded-lg border border-gray-200 dark:border-slate-700 text-gray-600 dark:text-gray-300">
                    <i id="theme-icon" class="fa-solid fa-moon text-lg"></i>
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-10">
        <div class="mb-8 p-5 bg-indigo-50 dark:bg-slate-900/50 border border-indigo-100 dark:border-slate-800/80 rounded-2xl flex flex-col sm:flex-row justify-between items-center gap-4">
            <div>
                <h2 class="text-lg font-semibold">Active Browser Parsing Node</h2>
                <p class="text-sm text-slate-500 dark:text-slate-400">Pulling unmodified data directly from unfiltered public server web streams.</p>
            </div>
            <div class="flex items-center space-x-2 bg-white dark:bg-darkCard px-3 py-1.5 rounded-xl border border-gray-200 dark:border-slate-800 text-xs font-semibold text-indigo-600">
                <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span><span>Direct Browser API Hook Active</span>
            </div>
        </div>

        <div id="price-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <div class="col-span-full flex flex-col items-center justify-center py-20 text-slate-400">
                <i class="fa-solid fa-spinner animate-spin text-4xl mb-4 text-indigo-500"></i>
                <p class="text-sm font-medium">Contacting live internet deal engine directly...</p>
            </div>
        </div>
    </main>

    <script>
        function toggleDarkMode() {
            const html = document.documentElement;
            html.classList.toggle('dark');
            document.getElementById('theme-icon').className = html.classList.contains('dark') ? 'fa-solid fa-sun text-lg' : 'fa-solid fa-moon text-lg';
        }

        async function fetchLivePrices() {
            const grid = document.getElementById('price-grid');
            // We fetch directly from the live open tech deals API right here in the frontend!
            const TARGET_API = "https://www.cheapshark.com/api/1.0/deals?storeID=1&upperPrice=50";
            
            try {
                const response = await fetch(TARGET_API);
                const rawDeals = await response.json();
                
                const liveItems = [];
                const usdToPhp = 58.50;
                
                // Take the top 6 real, live changing deals from the internet right now
                rawDeals.slice(0, 6).forEach(deal => {
                    const phpOriginal = floatFormat(deal.normalPrice * usdToPhp);
                    const phpSale = floatFormat(deal.salePrice * usdToPhp);
                    const discountPct = Math.round(parseFloat(deal.savings));
                    
                    liveItems.append({
                        item_name: deal.title,
                        original_price: `₱${phpOriginal}`,
                        observed_price_ph: `₱${phpSale}`,
                        discount_tag: `-${discountPct}% OFF`,
                        image_url: deal.thumb,
                        store_url: `https://www.cheapshark.com/redirect?dealID=${deal.dealID}`
                    });
                });
                
                displayItems(liveItems);
            } catch (e) {
                console.error(e);
                grid.innerHTML = `
                    <div class="col-span-full bg-red-50 dark:bg-red-950/20 border border-red-200 dark:border-red-900/50 rounded-2xl p-8 text-center text-red-600 dark:text-red-400">
                        <i class="fa-solid fa-triangle-exclamation text-3xl mb-3"></i>
                        <h3 class="font-bold text-lg">Internet Connection Interrupted</h3>
                        <p class="text-sm mt-1">Check your network connection and try again.</p>
                    </div>`;
            }
        }

        function floatFormat(num) {
            return num.toFixed(2).replace(/\d(?=(\d{3})+\.)/g, '$&,');
        }

        function displayItems(items) {
            const grid = document.getElementById('price-grid');
            grid.innerHTML = '';
            
            items.forEach(item => {
                const card = document.createElement('div');
                card.className = "bg-white dark:bg-darkCard rounded-2xl border border-gray-200 dark:border-slate-800/80 overflow-hidden shadow-sm flex flex-col hover:shadow-lg transition-all";
                card.innerHTML = `
                    <div class="relative pt-[56.25%] bg-slate-900">
                        <img src="${item.image_url}" class="absolute inset-0 w-full h-full object-contain p-2" onerror="this.src='https://images.unsplash.com/photo-1550745165-9bc0b252726f?w=500'">
                        <div class="absolute top-3 left-3 flex flex-col gap-2">
                            <span class="bg-indigo-600 text-white px-2.5 py-1 rounded-md text-xs font-black shadow-md">${item.discount_tag}</span>
                        </div>
                    </div>
                    <div class="p-6 flex flex-col flex-grow">
                        <h3 class="font-bold text-sm mb-4 line-clamp-2 h-10">${item.item_name}</h3>
                        <div class="flex flex-col mb-5 bg-slate-50 dark:bg-slate-900/40 p-3 rounded-xl border border-gray-100 dark:border-slate-800">
                            <div class="flex justify-between items-baseline text-xs font-semibold text-slate-400 line-through mb-1">
                                <span>List Price</span><span>${item.original_price}</span>
                            </div>
                            <div class="flex justify-between items-baseline">
                                <span class="text-xs uppercase font-bold text-indigo-500">Live Deal price</span>
                                <span class="text-xl font-black text-indigo-600 dark:text-indigo-400">${item.observed_price_ph}</span>
                            </div>
                        </div>
                        <a href="${item.store_url}" target="_blank" rel="noopener noreferrer" class="w-full text-center bg-gray-100 hover:bg-indigo-600 dark:bg-slate-800 dark:hover:bg-indigo-600 text-slate-700 dark:text-slate-300 hover:text-white py-2.5 rounded-xl font-bold transition-all text-xs flex items-center justify-center space-x-2">
                            <span>Inspect Store Listing</span><i class="fa-solid fa-arrow-up-right-from-square text-xs"></i>
                        </a>
                    </div>`;
                grid.appendChild(card);
            });
        }
        window.addEventListener('DOMContentLoaded', fetchLivePrices);
    </script>
</body>
</html>
