<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PH Tech Discount Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        darkBg: '#0f172a',
                        darkCard: '#1e293b'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-darkBg dark:text-gray-100 transition-colors duration-300 min-h-screen font-sans">

    <nav class="border-b border-gray-200 dark:border-slate-800 bg-white dark:bg-darkCard px-6 py-4 sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="bg-rose-600 text-white p-2 rounded-lg shadow-md">
                    <i class="fa-solid fa-tags text-xl"></i>
                </div>
                <span class="text-xl font-bold tracking-tight bg-gradient-to-r from-rose-500 to-indigo-600 bg-clip-text text-transparent">Live Market Tracker</span>
            </div>
            
            <div class="flex items-center space-x-4">
                <button onclick="fetchLivePrices()" class="bg-rose-600 hover:bg-rose-700 text-white px-4 py-2 rounded-lg font-medium shadow-md transition-all flex items-center space-x-2">
                    <i class="fa-solid fa-fire text-sm"></i>
                    <span>Scrape Fresh Discounts</span>
                </button>
                <button onclick="toggleDarkMode()" class="p-2.5 rounded-lg border border-gray-200 dark:border-slate-700 hover:bg-gray-100 dark:hover:bg-slate-800 transition-all text-gray-600 dark:text-gray-300">
                    <i id="theme-icon" class="fa-solid fa-moon text-lg"></i>
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-10">
        <div class="mb-8 p-5 bg-rose-50 dark:bg-slate-900/50 border border-rose-100 dark:border-slate-800/80 rounded-2xl flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
            <div>
                <h2 class="text-lg font-semibold text-slate-800 dark:text-slate-200">Dynamic Price Markdown Node</h2>
                <p class="text-sm text-slate-500 dark:text-slate-400">Comparing original retail benchmarks against real-time marketplace cost updates.</p>
            </div>
            <div class="flex items-center space-x-2 bg-white dark:bg-darkCard px-3 py-1.5 rounded-xl border border-gray-200 dark:border-slate-800 shadow-sm text-xs font-semibold text-rose-600 dark:text-rose-400">
                <span class="w-2 h-2 rounded-full bg-rose-500 animate-ping"></span>
                <span>Live Extraction Stream Active</span>
            </div>
        </div>

        <div id="price-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <div class="col-span-full flex flex-col items-center justify-center py-20 text-slate-400">
                <i class="fa-solid fa-spinner animate-spin text-4xl mb-4 text-rose-500"></i>
                <p class="text-sm font-medium">Scraping updated active discounts from backend cluster...</p>
            </div>
        </div>
    </main>

    <script>
        // Update this line with your absolute Render web URL endpoint
        const API_ENDPOINT = "https://my-first-api22.onrender.com/get-prices";

        function toggleDarkMode() {
            const html = document.documentElement;
            const icon = document.getElementById('theme-icon');
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                icon.className = 'fa-solid fa-moon text-lg';
                localStorage.setItem('theme', 'light');
            } else {
                html.classList.add('dark');
                icon.className = 'fa-solid fa-sun text-lg';
                localStorage.setItem('theme', 'dark');
            }
        }

        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
            document.getElementById('theme-icon').className = 'fa-solid fa-sun text-lg';
        }

        async function fetchLivePrices() {
            const grid = document.getElementById('price-grid');
            try {
                const response = await fetch(API_ENDPOINT);
                const result = await response.json();
                
                if (result.status === "success" && result.data) {
                    displayItems(result.data);
                } else {
                    throw new Error("Bad backend response schema");
                }
            } catch (error) {
                console.error("Fetch failure:", error);
                grid.innerHTML = `
                    <div class="col-span-full bg-red-50 dark:bg-red-950/20 border border-red-200 dark:border-red-900/50 rounded-2xl p-8 text-center text-red-600 dark:text-red-400">
                        <i class="fa-solid fa-triangle-exclamation text-3xl mb-3"></i>
                        <h3 class="font-bold text-lg">Live Scraping Interrupted</h3>
                        <p class="text-sm mt-1">Make sure your Render application backend web service is deployed and running correctly.</p>
                    </div>`;
            }
        }

        function displayItems(items) {
            const grid = document.getElementById('price-grid');
            grid.innerHTML = ''; 

            items.forEach(item => {
                const isAvailable = item.status.toLowerCase() === 'in stock';
                const badgeClass = isAvailable 
                    ? 'bg-emerald-100 text-emerald-800 dark:bg-emerald-950/40 dark:text-emerald-400' 
                    : 'bg-rose-100 text-rose-800 dark:bg-rose-950/40 dark:text-rose-400';

                const card = document.createElement('div');
                card.className = "bg-white dark:bg-darkCard rounded-2xl border border-gray-200 dark:border-slate-800/80 overflow-hidden shadow-sm hover:shadow-xl hover:-translate-y-1 transition-all duration-300 flex flex-col";
                
                card.innerHTML = `
                    <div class="relative pt-[56.25%] bg-slate-100 dark:bg-slate-900 overflow-hidden group">
                        <img src="${item.image_url}" alt="${item.item_name}" class="absolute inset-0 w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
                        <div class="absolute top-3 left-3 flex flex-col gap-2">
                            <span class="px-2.5 py-1 rounded-md text-xs font-bold uppercase tracking-wider shadow-sm ${badgeClass}">
                                ${item.status}
                            </span>
                            ${item.discount_tag ? `
                            <span class="bg-rose-600 text-white px-2.5 py-1 rounded-md text-xs font-black uppercase tracking-wider shadow-md w-max animate-bounce">
                                <i class="fa-solid fa-bolt mr-1"></i>${item.discount_tag}
                            </span>` : ''}
                        </div>
                    </div>
                    <div class="p-6 flex flex-col flex-grow">
                        <h3 class="font-bold text-base text-slate-800 dark:text-slate-100 mb-2 line-clamp-2">${item.item_name}</h3>
                        
                        <div class="flex flex-col mb-5">
                            <div class="flex justify-between items-baseline text-xs font-semibold text-slate-400 line-through mb-1">
                                <span>Original Retail</span>
                                <span>${item.original_price || '—'}</span>
                            </div>
                            <div class="flex justify-between items-baseline">
                                <span class="text-xs uppercase tracking-wider font-bold text-rose-500">Flash Deal Value</span>
                                <span class="text-2xl font-black text-rose-600 dark:text-rose-400">${item.observed_price_ph}</span>
                            </div>
                        </div>
                    </div>
                    <div class="px-6 pb-6 mt-auto">
                        <a href="${item.store_url}" target="_blank" rel="noopener noreferrer" class="w-full text-center bg-gray-100 hover:bg-rose-600 dark:bg-slate-800 dark:hover:bg-rose-600 text-slate-700 dark:text-slate-300 hover:text-white dark:hover:text-white py-3 rounded-xl font-bold transition-all duration-200 text-sm flex items-center justify-center space-x-2 shadow-sm">
                            <span>Grab Sale Bundle</span>
                            <i class="fa-solid fa-arrow-up-right-from-square text-xs"></i>
                        </a>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        window.addEventListener('DOMContentLoaded', fetchLivePrices);
    </script>
</body>
</html>
