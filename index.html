<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PH Gadget Price Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        darkBg: '#0f172a',
                        darkCard: '#1e293b'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-darkBg dark:text-gray-100 transition-colors duration-300 min-h-screen font-sans">

    <nav class="border-b border-gray-200 dark:border-slate-800 bg-white dark:bg-darkCard px-6 py-4 sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="bg-indigo-600 text-white p-2 rounded-lg shadow-md">
                    <i class="fa-solid fa-chart-line text-xl"></i>
                </div>
                <span class="text-xl font-bold tracking-tight bg-gradient-to-r from-indigo-500 to-purple-600 bg-clip-text text-transparent">PH Tech Price Matrix</span>
            </div>
            
            <div class="flex items-center space-x-4">
                <button onclick="fetchLivePrices()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg font-medium shadow-md transition-all flex items-center space-x-2">
                    <i class="fa-solid fa-rotate text-sm"></i>
                    <span>Sync Live Feed</span>
                </button>
                <button onclick="toggleDarkMode()" class="p-2.5 rounded-lg border border-gray-200 dark:border-slate-700 hover:bg-gray-100 dark:hover:bg-slate-800 transition-all text-gray-600 dark:text-gray-300">
                    <i id="theme-icon" class="fa-solid fa-moon text-lg"></i>
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-10">
        <div class="mb-8 p-5 bg-indigo-50 dark:bg-slate-900/50 border border-indigo-100 dark:border-slate-800/80 rounded-2xl flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
            <div>
                <h2 class="text-lg font-semibold text-slate-800 dark:text-slate-200">System Activity Stream</h2>
                <p class="text-sm text-slate-500 dark:text-slate-400">Monitoring real-time e-commerce tech variants for active price markdown drops.</p>
            </div>
            <div class="flex items-center space-x-2 bg-white dark:bg-darkCard px-3 py-1.5 rounded-xl border border-gray-200 dark:border-slate-800 shadow-sm text-xs font-semibold text-indigo-600 dark:text-indigo-400">
                <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                <span>Active Fetch Node: Vercel Cloud Platform</span>
            </div>
        </div>

        <div id="price-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <div class="col-span-full flex flex-col items-center justify-center py-20 text-slate-400">
                <i class="fa-solid fa-spinner animate-spin text-4xl mb-4 text-indigo-500"></i>
                <p class="text-sm font-medium">Connecting to Render backend instance matrix...</p>
            </div>
        </div>
    </main>

    <script>
        // Set the exact target URL for your Render deployment
        const API_ENDPOINT = "https://my-first-api22.onrender.com/get-prices";

        // Night Mode State Utility Switcher
        function toggleDarkMode() {
            const html = document.documentElement;
            const icon = document.getElementById('theme-icon');
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                icon.className = 'fa-solid fa-moon text-lg';
                localStorage.setItem('theme', 'light');
            } else {
                html.classList.add('dark');
                icon.className = 'fa-solid fa-sun text-lg';
                localStorage.setItem('theme', 'dark');
            }
        }

        // Keep local system memory layout preference
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
            document.getElementById('theme-icon').className = 'fa-solid fa-sun text-lg';
        }

        // Main Core Fetch Execution Thread
        async function fetchLivePrices() {
            const grid = document.getElementById('price-grid');
            try {
                const response = await fetch(API_ENDPOINT);
                const result = await response.json();
                
                if (result.status === "success" && result.data) {
                    displayItems(result.data);
                } else {
                    throw new Error("Invalid backend server json structure");
                }
            } catch (error) {
                console.error("Fetch failure:", error);
                grid.innerHTML = `
                    <div class="col-span-full bg-red-50 dark:bg-red-950/20 border border-red-200 dark:border-red-900/50 rounded-2xl p-8 text-center text-red-600 dark:text-red-400">
                        <i class="fa-solid fa-triangle-exclamation text-3xl mb-3"></i>
                        <h3 class="font-bold text-lg">Server Handshake Interrupted</h3>
                        <p class="text-sm mt-1 max-w-md mx-auto">Could not populate data feed stream. Verify your Render Web Service instance is fully active.</p>
                    </div>`;
            }
        }

        // UI Generation Engine with Built-in Hardcoded Image & Link Overrides
        function displayItems(items) {
            const grid = document.getElementById('price-grid');
            grid.innerHTML = ''; // Clean old template UI frame

            items.forEach(item => {
                // FORCE REPAIR: Absolute Frontend Overrides to crush the shoe links and target real items
                if (item.item_name.includes("Keyboard") || item.item_name.includes("F75")) {
                    item.image_url = "https://images.unsplash.com/photo-1618384887929-16ec33fab9ef?w=500&q=80";
                    item.store_url = "https://www.lazada.com.ph/tag/aula-f75/";
                } else if (item.item_name.includes("LED Strip") || item.item_name.includes("Govee")) {
                    item.image_url = "https://images.unsplash.com/photo-1563453392212-326f5e854473?w=500&q=80"; // Crisp LED neon room lighting
                    item.store_url = "https://www.lazada.com.ph/tag/govee-rgbic/";
                } else if (item.item_name.includes("Desk Mat") || item.item_name.includes("Felt")) {
                    item.image_url = "https://images.unsplash.com/photo-1632292224971-0d45778b3af8?w=500&q=80";
                    item.store_url = "https://www.lazada.com.ph/tag/felt-desk-mat/";
                } else if (item.item_name.includes("Mouse") && item.item_name.includes("Vertical")) {
                    item.image_url = "https://images.unsplash.com/photo-1615663245857-ac93bb7c39e7?w=500&q=80";
                    item.store_url = "https://www.lazada.com.ph/tag/delux-m618/";
                } else if (item.item_name.includes("Microphone") || item.item_name.includes("QuadCast")) {
                    item.image_url = "https://images.unsplash.com/photo-1590602847861-f357a9332bbc?w=500&q=80";
                    item.store_url = "https://www.lazada.com.ph/tag/hyperx-quadcast-s/";
                } else if (item.item_name.includes("G502") || item.item_name.includes("Gaming Mouse")) {
                    item.image_url = "https://images.unsplash.com/photo-1625842268584-8f3290462a41?w=500&q=80";
                    item.store_url = "https://www.lazada.com.ph/tag/logitech-g502-hero/";
                }

                // Status Badge Configurations
                const isAvailable = item.status.toLowerCase() === 'in stock';
                const badgeClass = isAvailable 
                    ? 'bg-emerald-100 text-emerald-800 dark:bg-emerald-950/40 dark:text-emerald-400' 
                    : 'bg-rose-100 text-rose-800 dark:bg-rose-950/40 dark:text-rose-400';

                // Build Individual Dynamic Component Blueprint
                const card = document.createElement('div');
                card.className = "bg-white dark:bg-darkCard rounded-2xl border border-gray-200 dark:border-slate-800/80 overflow-hidden shadow-sm hover:shadow-xl hover:-translate-y-1 transition-all duration-300 flex flex-col";
                
                card.innerHTML = `
                    <div class="relative pt-[56.25%] bg-slate-100 dark:bg-slate-900 overflow-hidden group">
                        <img src="${item.image_url}" alt="${item.item_name}" class="absolute inset-0 w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" onerror="this.src='https://images.unsplash.com/photo-1587829741301-dc798b83add3?w=500&q=80'">
                        <div class="absolute top-3 right-3">
                            <span class="px-2.5 py-1 rounded-md text-xs font-bold uppercase tracking-wider shadow-sm ${badgeClass}">
                                ${item.status}
                            </span>
                        </div>
                    </div>
                    <div class="p-6 flex flex-col flex-grow">
                        <h3 class="font-bold text-base text-slate-800 dark:text-slate-100 mb-4 line-clamp-2 flex-grow">${item.item_name}</h3>
                        <div class="flex justify-between items-baseline mb-5">
                            <span class="text-xs uppercase tracking-wider font-semibold text-slate-400">Benchmark Value</span>
                            <span class="text-2xl font-black text-indigo-600 dark:text-indigo-400">${item.observed_price_ph}</span>
                        </div>
                        <a href="${item.store_url}" target="_blank" rel="noopener noreferrer" class="w-full text-center bg-gray-100 hover:bg-indigo-600 dark:bg-slate-800 dark:hover:bg-indigo-600 text-slate-700 dark:text-slate-300 hover:text-white dark:hover:text-white py-3 rounded-xl font-bold transition-all duration-200 text-sm flex items-center justify-center space-x-2 shadow-sm">
                            <span>View Item in Store</span>
                            <i class="fa-solid fa-rocket text-xs"></i>
                        </a>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // Run fetch on base mount
        window.addEventListener('DOMContentLoaded', fetchLivePrices);
    </script>
</body>
</html>
