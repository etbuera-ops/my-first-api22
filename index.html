<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Automated Price Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans">

    <nav class="border-b border-slate-800 bg-slate-950 px-6 py-4 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <span class="text-xl font-bold bg-gradient-to-r from-emerald-400 to-teal-500 bg-clip-text text-transparent">Local Automation Pipeline</span>
            </div>
            <button onclick="fetchLocalPrices()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-lg font-medium shadow-md transition-all flex items-center space-x-2">
                <i class="fa-solid fa-robot"></i><span>Run Local Browser Scraper</span>
            </button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-10">
        <div id="price-grid" class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="col-span-full text-center text-slate-500 py-20">
                <p>Click "Run Local Browser Scraper" to initiate background automation tasks.</p>
            </div>
        </div>
    </main>

    <script>
        // Points directly to the Python server engine running on your computer
        const LOCAL_API = "http://127.0.0.1:8000/get-prices";

        async function fetchLocalPrices() {
            const grid = document.getElementById('price-grid');
            grid.innerHTML = `
                <div class="col-span-full flex flex-col items-center justify-center py-20 text-slate-400">
                    <i class="fa-solid fa-cog animate-spin text-4xl mb-4 text-emerald-400"></i>
                    <p class="text-sm font-medium">Local Playwright instance scanning live web markup...</p>
                </div>`;
            
            try {
                const response = await fetch(LOCAL_API);
                const result = await response.json();
                
                if (result.status === "success" && result.data) {
                    grid.innerHTML = '';
                    result.data.forEach(item => {
                        const card = document.createElement('div');
                        card.className = "bg-slate-950 rounded-2xl border border-slate-800 overflow-hidden shadow-xl flex flex-col";
                        card.innerHTML = `
                            <div class="relative pt-[56.25%] bg-slate-900">
                                <img src="${item.image_url}" class="absolute inset-0 w-full h-full object-cover">
                                <span class="absolute top-3 left-3 bg-emerald-600 text-white px-2.5 py-1 rounded-md text-xs font-black shadow-md">${item.discount_tag}</span>
                            </div>
                            <div class="p-6 flex flex-col flex-grow">
                                <h3 class="font-bold text-base mb-4">${item.item_name}</h3>
                                <div class="flex justify-between items-baseline mb-4">
                                    <span class="text-xs uppercase font-bold text-emerald-400">Live Scraped Price</span>
                                    <span class="text-2xl font-black text-emerald-400">${item.observed_price_ph}</span>
                                </div>
                                <a href="${item.store_url}" target="_blank" class="text-center bg-slate-800 hover:bg-emerald-600 py-2 rounded-xl transition-all text-sm font-bold text-white">View Page Source</a>
                            </div>`;
                        grid.appendChild(card);
                    });
                }
            } catch (e) {
                grid.innerHTML = `
                    <div class="col-span-full border border-rose-900 bg-rose-950/20 rounded-2xl p-8 text-center text-rose-400">
                        <h3 class="font-bold text-lg">Local Python Engine Offline</h3>
                        <p class="text-sm mt-1">Make sure you ran 'uvicorn main:app --reload' in your terminal.</p>
                    </div>`;
            }
        }
    </script>
</body>
</html>
