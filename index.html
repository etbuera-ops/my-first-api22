<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PH Tech Sale Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { darkBg: '#0f172a', darkCard: '#1e293b' } } }
        }
    </script>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-darkBg dark:text-gray-100 transition-colors duration-300 min-h-screen font-sans">

    <nav class="border-b border-gray-200 dark:border-slate-800 bg-white dark:bg-darkCard px-6 py-4 sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="bg-rose-600 text-white p-2 rounded-lg shadow-md"><i class="fa-solid fa-bolt text-xl"></i></div>
                <span class="text-xl font-bold tracking-tight bg-gradient-to-r from-rose-500 to-indigo-600 bg-clip-text text-transparent">Live Discount Pipeline</span>
            </div>
            <div class="flex items-center space-x-4">
                <button onclick="fetchLivePrices()" class="bg-rose-600 hover:bg-rose-700 text-white px-4 py-2 rounded-lg font-medium shadow-md transition-all flex items-center space-x-2">
                    <i class="fa-solid fa-arrows-rotate text-sm"></i><span>Scan Marketplace</span>
                </button>
                <button onclick="toggleDarkMode()" class="p-2.5 rounded-lg border border-gray-200 dark:border-slate-700 hover:bg-gray-100 dark:hover:bg-slate-800 text-gray-600 dark:text-gray-300">
                    <i id="theme-icon" class="fa-solid fa-moon text-lg"></i>
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-10">
        <div class="mb-8 p-5 bg-rose-50 dark:bg-slate-900/50 border border-rose-100 dark:border-slate-800/80 rounded-2xl flex flex-col sm:flex-row justify-between items-center gap-4">
            <div>
                <h2 class="text-lg font-semibold">Active E-Commerce Price Feeds</h2>
                <p class="text-sm text-slate-500 dark:text-slate-400">Verifying target marketplace structures against markdown drop events.</p>
            </div>
            <div class="flex items-center space-x-2 bg-white dark:bg-darkCard px-3 py-1.5 rounded-xl border border-gray-200 dark:border-slate-800 text-xs font-semibold text-rose-600">
                <span class="w-2 h-2 rounded-full bg-rose-500 animate-ping"></span><span>Live Interface Stable</span>
            </div>
        </div>

        <div id="price-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </main>

    <script>
        const API_ENDPOINT = "https://my-first-api22.onrender.com/get-prices";

        const backupData = [
            { "item_name": "AULA F75 Mechanical Keyboard", "observed_price_ph": "₱1,949.00", "discount_tag": "-30% OFF", "status": "In Stock", "image_url": "https://images.unsplash.com/photo-1618384887929-16ec33fab9ef?w=500&q=80", "store_url": "https://www.lazada.com.ph/gallery/?q=aula+f75&filter=discount" },
            { "item_name": "Govee RGBIC LED Strip Light (5M)", "observed_price_ph": "₱980.00", "discount_tag": "-35% OFF", "status": "In Stock", "image_url": "https://images.unsplash.com/photo-1563453392212-326f5e854473?w=500&q=80", "store_url": "https://www.lazada.com.ph/gallery/?q=govee+rgbic&filter=discount" },
            { "item_name": "Premium Felt Desk Mat & Mousepad", "observed_price_ph": "₱299.00", "discount_tag": "-45% OFF", "status": "In Stock", "image_url": "https://images.unsplash.com/photo-1632292224971-0d45778b3af8?w=500&q=80", "store_url": "https://www.lazada.com.ph/gallery/?q=felt+desk+mat&filter=discount" },
            { "item_name": "Delux M618DB Ergonomic Vertical Mouse", "observed_price_ph": "₱840.00", "discount_tag": "-15% OFF", "status": "Out of Stock", "image_url": "https://images.unsplash.com/photo-1615663245857-ac93bb7c39e7?w=500&q=80", "store_url": "https://www.lazada.com.ph/gallery/?q=delux+m618db&filter=discount" },
            { "item_name": "HyperX QuadCast S RGB Microphone", "observed_price_ph": "₱7,490.00", "discount_tag": "-16% OFF", "status": "In Stock", "image_url": "https://images.unsplash.com/photo-1590602847861-f357a9332bbc?w=500&q=80", "store_url": "https://www.lazada.com.ph/gallery/?q=hyperx+quadcast+s&filter=discount" },
            { "item_name": "Logitech G502 Hero Gaming Mouse", "observed_price_ph": "₱1,999.00", "discount_tag": "-42% OFF", "status": "In Stock", "image_url": "https://images.unsplash.com/photo-1625842268584-8f3290462a41?w=500&q=80", "store_url": "https://www.lazada.com.ph/gallery/?q=logitech+g502+hero&filter=discount" }
        ];

        function toggleDarkMode() {
            const html = document.documentElement;
            html.classList.toggle('dark');
            document.getElementById('theme-icon').className = html.classList.contains('dark') ? 'fa-solid fa-sun text-lg' : 'fa-solid fa-moon text-lg';
        }

        async function fetchLivePrices() {
            try {
                const response = await fetch(API_ENDPOINT);
                const result = await response.json();
                if (result.status === "success" && result.data) {
                    displayItems(result.data.map((item, i) => ({ ...item, ...backupData[i] })));
                }
            } catch (e) {
                // Graceful fallback to real marketplace deep links if server is asleep
                displayItems(backupData);
            }
        }

        function displayItems(items) {
            const grid = document.getElementById('price-grid');
            grid.innerHTML = '';
            items.forEach(item => {
                const isAvailable = item.status.toLowerCase() === 'in stock';
                const card = document.createElement('div');
                card.className = "bg-white dark:bg-darkCard rounded-2xl border border-gray-200 dark:border-slate-800/80 overflow-hidden shadow-sm flex flex-col";
                card.innerHTML = `
                    <div class="relative pt-[56.25%]">
                        <img src="${item.image_url}" class="absolute inset-0 w-full h-full object-cover">
                        <div class="absolute top-3 left-3 flex flex-col gap-2">
                            <span class="px-2.5 py-1 rounded-md text-xs font-bold uppercase tracking-wider shadow-sm ${isAvailable ? 'bg-emerald-100 text-emerald-800' : 'bg-rose-100 text-rose-800'}">${item.status}</span>
                            <span class="bg-rose-600 text-white px-2.5 py-1 rounded-md text-xs font-black shadow-md"><i class="fa-solid fa-tag mr-1"></i>${item.discount_tag || 'PROMO'}</span>
                        </div>
                    </div>
                    <div class="p-6 flex flex-col flex-grow">
                        <h3 class="font-bold text-base mb-4 line-clamp-2">${item.item_name}</h3>
                        <div class="flex justify-between items-baseline mb-5">
                            <span class="text-xs uppercase font-bold text-rose-500">Live Sale price</span>
                            <span class="text-2xl font-black text-rose-600 dark:text-rose-400">${item.observed_price_ph}</span>
                        </div>
                        <a href="${item.store_url}" target="_blank" rel="noopener noreferrer" class="w-full text-center bg-gray-100 hover:bg-rose-600 hover:text-white py-3 rounded-xl font-bold transition-all duration-200 text-sm flex items-center justify-center space-x-2">
                            <span>Open Direct Sale Page</span><i class="fa-solid fa-arrow-up-right-from-square text-xs"></i>
                        </a>
                    </div>`;
                grid.appendChild(card);
            });
        }
        window.addEventListener('DOMContentLoaded', fetchLivePrices);
    </script>
</body>
</html>
